<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAG Chatbot — Hỏi đáp tài liệu</title>
<style>
  :root {
    --bg: #f4f5f7; --panel: #ffffff; --border: #e2e4e9;
    --text: #1c2333; --muted: #6b7280; --accent: #2563eb;
    --user-bubble: #2563eb; --user-text: #ffffff;
    --bot-bubble: #ffffff; --ok: #16a34a; --warn: #d97706; --danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10131a; --panel: #181c26; --border: #2a3040;
      --text: #e5e9f0; --muted: #8b93a5; --accent: #3b82f6;
      --user-bubble: #2563eb; --user-text: #ffffff; --bot-bubble: #1f2532;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg);
    color: var(--text); height: 100vh; display: flex; overflow: hidden;
  }
  /* ---------- sidebar ---------- */
  #sidebar {
    width: 280px; min-width: 280px; background: var(--panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  #sidebar header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  #sidebar h1 { font-size: 15px; }
  #sidebar h1 small { display: block; font-weight: 400; color: var(--muted); font-size: 11px; margin-top: 2px; }
  #btn-new {
    margin: 12px 16px 8px; padding: 9px; border: 0; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 13px; cursor: pointer;
  }
  #btn-new:hover { filter: brightness(1.1); }
  #session-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  .session-item {
    display: flex; align-items: center; gap: 6px; padding: 9px 10px; margin: 2px 0;
    border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .session-item:hover { background: var(--bg); }
  .session-item.active { background: var(--bg); outline: 1px solid var(--border); }
  .session-item .title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .meta { color: var(--muted); font-size: 11px; }
  .session-item .del { visibility: hidden; border: 0; background: none; color: var(--muted); cursor: pointer; font-size: 13px; }
  .session-item:hover .del { visibility: visible; }
  .session-item .del:hover { color: var(--danger); }
  /* ---------- main ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 24px 0; }
  .row { max-width: 820px; margin: 0 auto 16px; padding: 0 24px; display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble {
    max-width: 85%; padding: 11px 15px; border-radius: 14px; font-size: 14px;
    line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  }
  .user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .bot .bubble {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-bottom-left-radius: 4px; width: 100%;
  }
  .bubble cite { color: var(--accent); font-style: normal; font-weight: 600; }
  .sources { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 8px; font-size: 12px; color: var(--muted); }
  .sources div { margin: 2px 0; }
  .badges { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
  .badge.ok { color: var(--ok); border-color: var(--ok); }
  .badge.warn { color: var(--warn); border-color: var(--warn); }
  .condense { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 6px; }
  .error .bubble { border-color: var(--danger); color: var(--danger); }
  #empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; text-align: center; padding: 0 40px; line-height: 1.8; }
  /* typing indicator */
  .typing span { display: inline-block; width: 7px; height: 7px; margin-right: 4px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .25 } 40% { opacity: 1 } }
  /* ---------- composer ---------- */
  #composer { border-top: 1px solid var(--border); background: var(--panel); padding: 14px 24px 18px; }
  #composer .inner { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  #input {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--text); font: inherit; font-size: 14px;
    padding: 10px 14px; max-height: 140px; outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #btn-send {
    border: 0; border-radius: 10px; background: var(--accent); color: #fff;
    padding: 10px 20px; font-size: 14px; cursor: pointer; height: 41px;
  }
  #btn-send:disabled { opacity: .5; cursor: default; }
  #hint { max-width: 820px; margin: 6px auto 0; font-size: 11px; color: var(--muted); }
  /* ---------- documents modal ---------- */
  #btn-docs {
    margin: 0 16px 14px; padding: 8px; border: 1px solid var(--border); border-radius: 8px;
    background: none; color: var(--text); font-size: 13px; cursor: pointer;
  }
  #btn-docs:hover { background: var(--bg); }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
    align-items: center; justify-content: center; z-index: 10;
  }
  #overlay.open { display: flex; }
  #docs-modal {
    width: min(680px, 92vw); max-height: 84vh; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column;
  }
  #docs-modal header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  #docs-modal header h2 { font-size: 15px; }
  #docs-close { border: 0; background: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  #upload-zone { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 13px; }
  #upload-zone input[type=file] { flex: 1; min-width: 200px; font-size: 12px; color: var(--muted); }
  #upload-zone input[type=text] {
    width: 110px; padding: 6px 9px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--bg); color: var(--text); font-size: 12px;
  }
  #upload-zone label { display: flex; gap: 4px; align-items: center; color: var(--muted); font-size: 12px; }
  #btn-upload { border: 0; border-radius: 7px; background: var(--accent); color: #fff; padding: 7px 16px; font-size: 13px; cursor: pointer; }
  #btn-upload:disabled { opacity: .5; }
  #doc-list { overflow-y: auto; padding: 8px 18px 16px; }
  .doc-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 4px;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .doc-row:last-child { border-bottom: 0; }
  .doc-row .name { flex: 1; min-width: 0; }
  .doc-row .name b { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-row .name small { color: var(--muted); font-size: 11px; display: block; margin-top: 2px; }
  .doc-badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
  .doc-badge.ingested { color: var(--ok); border: 1px solid var(--ok); }
  .doc-badge.processing { color: var(--warn); border: 1px solid var(--warn); animation: pulse 1.2s infinite; }
  .doc-badge.failed { color: var(--danger); border: 1px solid var(--danger); }
  .doc-badge.duplicate { color: var(--muted); border: 1px solid var(--border); }
  @keyframes pulse { 50% { opacity: .45 } }
  .doc-row .del-doc { border: 0; background: none; color: var(--muted); cursor: pointer; font-size: 14px; }
  .doc-row .del-doc:hover { color: var(--danger); }
  #doc-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
</style>
</head>
<body>
  <aside id="sidebar">
    <header><h1>📚 RAG Chatbot<small>Hỏi đáp tài liệu — có trích nguồn, không bịa</small></h1></header>
    <button id="btn-new">＋ Cuộc trò chuyện mới</button>
    <div id="session-list"></div>
    <button id="btn-docs">📄 Quản lý tài liệu</button>
  </aside>

  <div id="overlay">
    <div id="docs-modal">
      <header>
        <h2>📄 Tài liệu trong kho</h2>
        <button id="docs-close" title="Đóng">✕</button>
      </header>
      <div id="upload-zone">
        <input type="file" id="doc-file" accept=".pdf,.docx,.txt,.md,.markdown">
        <input type="text" id="doc-dept" placeholder="dept (tuỳ chọn)">
        <label><input type="checkbox" id="doc-conf"> mật</label>
        <button id="btn-upload">Tải lên</button>
      </div>
      <div id="doc-list"></div>
    </div>
  </div>

  <main id="main">
    <div id="messages" hidden></div>
    <div id="empty">Chọn phiên bên trái hoặc tạo cuộc trò chuyện mới.<br>
      Bot chỉ trả lời từ tài liệu đã nạp vào kho, kèm trích dẫn <b>[n]</b>.</div>
    <div id="composer">
      <div class="inner">
        <textarea id="input" rows="1" placeholder="Đặt câu hỏi về tài liệu... (Enter gửi, Shift+Enter xuống dòng)"></textarea>
        <button id="btn-send">Gửi</button>
      </div>
      <div id="hint">Câu hỏi nối tiếp ("thế còn...?") được tự viết lại đủ ngữ cảnh trước khi tìm tài liệu.</div>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
let currentSid = null;
let busy = false;

const esc = (s) => s.replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
// [n] -> tô màu trích dẫn
const fmtAnswer = (s) => esc(s).replace(/\[(\d+)\]/g, "<cite>[$1]</cite>");

async function api(path, opts = {}) {
  const r = await fetch("/api" + path, {
    headers: { "Content-Type": "application/json" }, ...opts,
  });
  if (!r.ok) {
    let detail = r.statusText;
    try { detail = (await r.json()).detail || detail; } catch {}
    throw new Error(detail);
  }
  return r.json();
}

/* ---------------- sidebar ---------------- */
async function refreshSessions() {
  const sessions = await api("/sessions");
  const box = $("session-list");
  box.innerHTML = "";
  for (const s of sessions.slice().reverse()) {
    const item = document.createElement("div");
    item.className = "session-item" + (s.session_id === currentSid ? " active" : "");
    item.innerHTML =
      `<span class="title">${esc(s.title || "(chưa có tiêu đề)")}</span>` +
      `<span class="meta">${s.n_messages / 2 | 0}↩</span>` +
      `<button class="del" title="Xoá phiên">✕</button>`;
    item.onclick = () => openSession(s.session_id);
    item.querySelector(".del").onclick = async (e) => {
      e.stopPropagation();
      if (!confirm("Xoá phiên này và toàn bộ hội thoại?")) return;
      await api("/sessions/" + s.session_id, { method: "DELETE" });
      if (currentSid === s.session_id) { currentSid = null; showEmpty(); }
      refreshSessions();
    };
    box.appendChild(item);
  }
}

function showEmpty() {
  $("messages").hidden = true;
  $("empty").style.display = "flex";
}

/* ---------------- messages ---------------- */
function addRow(kind, html) {
  const row = document.createElement("div");
  row.className = "row " + kind;
  row.innerHTML = `<div class="bubble">${html}</div>`;
  $("messages").appendChild(row);
  $("messages").scrollTop = $("messages").scrollHeight;
  return row;
}

function botHtml(m) {
  let html = fmtAnswer(m.content ?? m.answer ?? "");
  const sources = m.sources || [];
  if (sources.length) {
    html += `<div class="sources">` + sources.map((s) =>
      `<div><cite>[${s.n}]</cite> ${esc(s.source)} — trang ${s.page}` +
      (s.rel != null ? ` — liên quan ${Math.round(s.rel * 100)}%` : "") + `</div>`
    ).join("") + `</div>`;
  }
  if (m.grounded !== undefined) {
    const g = m.grounded
      ? `<span class="badge ok">✓ có nguồn</span>`
      : `<span class="badge warn">⚠ trích dẫn không hợp lệ</span>`;
    html += `<div class="badges">${g}<span class="badge">${esc(m.mode || "")}</span></div>`;
  }
  if (m.standalone && m.question && m.standalone !== m.question) {
    html += `<div class="condense">đã hiểu là: “${esc(m.standalone)}”</div>`;
  }
  return html;
}

async function openSession(sid) {
  currentSid = sid;
  $("empty").style.display = "none";
  $("messages").hidden = false;
  $("messages").innerHTML = "";
  const data = await api("/sessions/" + sid);
  for (const m of data.messages) {
    if (m.role === "user") addRow("user", esc(m.content));
    else addRow("bot", botHtml(m));
  }
  refreshSessions();
  $("input").focus();
}

/* ---------------- gửi câu hỏi ---------------- */
async function send() {
  const q = $("input").value.trim();
  if (!q || busy) return;
  if (!currentSid) {
    const { session_id } = await api("/sessions", { method: "POST", body: "{}" });
    currentSid = session_id;
    $("empty").style.display = "none";
    $("messages").hidden = false;
    $("messages").innerHTML = "";
  }
  busy = true;
  $("btn-send").disabled = true;
  $("input").value = "";
  autosize();
  addRow("user", esc(q));
  const typing = addRow("bot", `<span class="typing"><span></span><span></span><span></span></span>`);
  try {
    const r = await api(`/sessions/${currentSid}/messages`, {
      method: "POST", body: JSON.stringify({ question: q }),
    });
    typing.querySelector(".bubble").innerHTML = botHtml({ ...r, question: q });
  } catch (e) {
    typing.className = "row bot error";
    typing.querySelector(".bubble").textContent = "Lỗi: " + e.message;
  } finally {
    busy = false;
    $("btn-send").disabled = false;
    $("messages").scrollTop = $("messages").scrollHeight;
    refreshSessions();
    $("input").focus();
  }
}

/* ---------------- input UX ---------------- */
function autosize() {
  const el = $("input");
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}
$("input").addEventListener("input", autosize);
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("btn-send").onclick = send;
$("btn-new").onclick = async () => {
  const { session_id } = await api("/sessions", { method: "POST", body: "{}" });
  await openSession(session_id);
};

/* ---------------- quản lý tài liệu ---------------- */
const STATUS_VI = {
  ingested: "✓ đã nạp", processing: "⏳ đang xử lý",
  failed: "✗ lỗi", duplicate: "↩ trùng",
};
let docsTimer = null;

async function refreshDocs() {
  let docs;
  try { docs = await api("/documents"); } catch { return; }
  const box = $("doc-list");
  box.innerHTML = "";
  if (!docs.length) {
    box.innerHTML = `<div id="doc-empty">Kho trống — tải tài liệu (.pdf/.docx/.txt/.md) lên để bắt đầu.</div>`;
  }
  for (const d of docs) {
    const row = document.createElement("div");
    row.className = "doc-row";
    const detail = d.status === "ingested"
      ? `${d.parents} cha / ${d.children} con` + (d.message ? ` — ${d.message}` : "")
      : (d.message || "");
    row.innerHTML =
      `<div class="name"><b>${esc(d.source)}</b><small>${esc(detail)}</small></div>` +
      `<span class="doc-badge ${d.status}">${STATUS_VI[d.status] || esc(d.status)}</span>` +
      `<button class="del-doc" title="Xoá khỏi kho">🗑</button>`;
    row.querySelector(".del-doc").onclick = async () => {
      if (!confirm(`Xoá "${d.source}" khỏi kho? Bot sẽ không trả lời được từ tài liệu này nữa.`)) return;
      await api("/documents/" + d.doc_id, { method: "DELETE" });
      refreshDocs();
    };
    box.appendChild(row);
  }
  // còn tài liệu đang xử lý -> tự cập nhật mỗi 2s
  if (docs.some((d) => d.status === "processing")) {
    clearTimeout(docsTimer);
    docsTimer = setTimeout(refreshDocs, 2000);
  }
}

$("btn-upload").onclick = async () => {
  const f = $("doc-file").files[0];
  if (!f) { alert("Chọn file trước đã (.pdf/.docx/.txt/.md)"); return; }
  const fd = new FormData();
  fd.append("file", f);
  fd.append("dept", $("doc-dept").value.trim());
  fd.append("confidential", $("doc-conf").checked ? "true" : "false");
  $("btn-upload").disabled = true;
  try {
    const r = await fetch("/api/documents", { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    $("doc-file").value = "";
    refreshDocs();
  } catch (e) {
    alert("Lỗi upload: " + e.message);
  } finally {
    $("btn-upload").disabled = false;
  }
};

$("btn-docs").onclick = () => { $("overlay").classList.add("open"); refreshDocs(); };
$("docs-close").onclick = () => { $("overlay").classList.remove("open"); clearTimeout(docsTimer); };
$("overlay").onclick = (e) => { if (e.target === $("overlay")) $("docs-close").onclick(); };

refreshSessions();
</script>
</body>
</html>
